kind = "web"
previewPath = "/"
title = "Cortexa"
version = "1.0.0"
id = "artifacts/cortexa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26123

[services.development]
run = "pnpm --filter @workspace/cortexa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cortexa", "run", "build" ]
publicDir = "artifacts/cortexa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26123"
BASE_PATH = "/"
